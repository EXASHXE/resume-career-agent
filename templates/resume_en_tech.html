<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{name}} — {{target_role}}</title>
<style>
@page { size: A4; margin: 12mm }
* { box-sizing: border-box }
body { font: 10.25pt/1.35 Arial, sans-serif; color: #172033; margin: 0 }
h1 { font-size: 22pt; margin: 0 }
h2 { font-size: 11.5pt; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid #334155; margin: 10px 0 4px }
h3 { font-size: 10.5pt; margin: 6px 0 2px }
.meta { color: #475569 }
.row { display: flex; justify-content: space-between; gap: 12px }
ul { margin: 2px 0 5px; padding-left: 18px }
li { margin: 1px 0 }
a { color: inherit }
</style>
</head>
<body>
<header>
  <h1>{{name}}</h1>
  <div class="meta">{{target_role}} · {{location}} · {{phone}} · {{email}} · {{links}}</div>
</header>
<section>
  <h2>Summary</h2>
  <p>{{summary}}</p>
</section>
<section>
  <h2>Skills</h2>
  <p>{{skills}}</p>
</section>
<section>
  <h2>Experience</h2>
  {{experience_html}}
</section>
<section>
  <h2>Projects</h2>
  {{projects_html}}
</section>
<section>
  <h2>Education</h2>
  {{education_html}}
</section>
</body>
</html>
